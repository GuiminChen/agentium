version: "v1-staging"
identity_provider:
  type: "oidc"
  issuer: "https://idp.staging.example.com"
  audience: "agentium-staging"
  jwks_url: "https://idp.staging.example.com/.well-known/jwks.json"
  tenant_claim: "tenant_id"
  roles_claim: "roles"
  subject_claim: "sub"
authorization:
  type: "abac"
  policy_file: "configs/abac-policy.yaml"
  hot_reload: true
telemetry:
  provider: "otel"
  service_name: "agentium-staging"
  exporters:
    traces: "otlp"
    metrics: "otlp"
    logs: "otlp"
