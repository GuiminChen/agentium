# Agentium runtime plugins — single source of truth for orchestration, memory, evolution.
# Override path via AGENTIUM_PLUGINS_CONFIG. Secrets: use *_from_env only (never commit keys).

orchestration:
  backend: native
  # langgraph: reserved for future structured options
  langgraph: {}

memory:
  backend: memory
  optional_mem0_lane: false
  # Relative paths resolve under AppSettings.data_dir unless absolute.
  sqlite_relative_path: "memory.sqlite"
  mem0:
    api_key_from_env: "MEM0_API_KEY"
    base_url: ""
    collection: ""

evolution:
  plugin: native
  http_enabled: false
  hermes_class:
    max_proposals_per_invocation: 8

llm_wiki:
  enabled: false
  raw_storage:
    backend: local
    base_path: "raw_blob"
    cos_staging_relative_path: "cos_wiki_staging"
  wiki_db:
    backend: sqlite
    sqlite_relative_path: "llm_wiki.sqlite"
    postgresql_conninfo_from_env: ""
  vault_relative_path: "wiki_vault"
  ingest_extra_roots: []
  watch_enabled: false
  debounce_ms: 500
  wiki_search_block_session_when_jobs_pending: true
  wiki_pending_job_gate_ttl_seconds: 3600
