version: "v1-dev"
identity_provider:
  type: "oidc"
  issuer: "https://idp.dev.example.com"
  audience: "agentium-dev"
  jwks_url: "https://idp.dev.example.com/.well-known/jwks.json"
  tenant_claim: "tenant_id"
  roles_claim: "roles"
  subject_claim: "sub"
authorization:
  type: "abac"
  policy_file: "configs/abac-policy.yaml"
  hot_reload: true
telemetry:
  provider: "otel"
  service_name: "agentium-dev"
  exporters:
    traces: "console"
    metrics: "console"
    logs: "console"
